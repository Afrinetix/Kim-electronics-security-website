<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" fill="none">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#f0faf4"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7cb87a"/>
      <stop offset="100%" stop-color="#5a9657"/>
    </linearGradient>
    <linearGradient id="postGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a3728"/>
      <stop offset="100%" stop-color="#6b5040"/>
    </linearGradient>
    <linearGradient id="wireGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="50%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="340" fill="url(#sky)" rx="12"/>

  <!-- Distant hills -->
  <ellipse cx="120" cy="240" rx="160" ry="60" fill="#c8e6c9" opacity="0.5"/>
  <ellipse cx="380" cy="245" rx="160" ry="55" fill="#c8e6c9" opacity="0.4"/>

  <!-- Ground -->
  <rect x="0" y="260" width="500" height="80" fill="url(#ground)" rx="0"/>
  <rect x="0" y="258" width="500" height="12" rx="2" fill="#8bc34a" opacity="0.6"/>

  <!-- Fence posts (6 posts) -->
  <!-- Post 1 -->
  <rect x="48" y="130" width="14" height="135" rx="3" fill="url(#postGrad)" filter="url(#shadow)"/>
  <rect x="45" y="126" width="20" height="8" rx="2" fill="#5d3f2a"/>
  <!-- Cross support -->
  <rect x="42" y="180" width="26" height="6" rx="2" fill="#5d3f2a"/>

  <!-- Post 2 -->
  <rect x="148" y="130" width="14" height="135" rx="3" fill="url(#postGrad)" filter="url(#shadow)"/>
  <rect x="145" y="126" width="20" height="8" rx="2" fill="#5d3f2a"/>
  <rect x="142" y="180" width="26" height="6" rx="2" fill="#5d3f2a"/>

  <!-- Post 3 -->
  <rect x="248" y="125" width="14" height="140" rx="3" fill="url(#postGrad)" filter="url(#shadow)"/>
  <rect x="245" y="121" width="20" height="8" rx="2" fill="#5d3f2a"/>
  <rect x="242" y="175" width="26" height="6" rx="2" fill="#5d3f2a"/>

  <!-- Post 4 -->
  <rect x="348" y="130" width="14" height="135" rx="3" fill="url(#postGrad)" filter="url(#shadow)"/>
  <rect x="345" y="126" width="20" height="8" rx="2" fill="#5d3f2a"/>
  <rect x="342" y="180" width="26" height="6" rx="2" fill="#5d3f2a"/>

  <!-- Post 5 -->
  <rect x="438" y="133" width="14" height="132" rx="3" fill="url(#postGrad)" filter="url(#shadow)"/>
  <rect x="435" y="129" width="20" height="8" rx="2" fill="#5d3f2a"/>
  <rect x="432" y="183" width="26" height="6" rx="2" fill="#5d3f2a"/>

  <!-- Electric wires (5 strands with glow effect) -->
  <!-- Wire strand 1 (top) -->
  <line x1="55" y1="140" x2="445" y2="140" stroke="#888" stroke-width="1.5" opacity="0.4"/>
  <line x1="55" y1="140" x2="445" y2="140" stroke="url(#wireGlow)" stroke-width="2" filter="url(#glow)" opacity="0.9"/>

  <!-- Wire strand 2 -->
  <line x1="55" y1="158" x2="445" y2="158" stroke="#888" stroke-width="1.5" opacity="0.4"/>
  <line x1="55" y1="158" x2="445" y2="158" stroke="url(#wireGlow)" stroke-width="2" filter="url(#glow)" opacity="0.85"/>

  <!-- Wire strand 3 -->
  <line x1="55" y1="176" x2="445" y2="176" stroke="#888" stroke-width="1.5" opacity="0.4"/>
  <line x1="55" y1="176" x2="445" y2="176" stroke="url(#wireGlow)" stroke-width="2" filter="url(#glow)" opacity="0.9"/>

  <!-- Wire strand 4 -->
  <line x1="55" y1="196" x2="445" y2="196" stroke="#888" stroke-width="1.5" opacity="0.4"/>
  <line x1="55" y1="196" x2="445" y2="196" stroke="#ffcc00" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>

  <!-- Wire strand 5 -->
  <line x1="55" y1="214" x2="445" y2="214" stroke="#888" stroke-width="1.5" opacity="0.4"/>
  <line x1="55" y1="214" x2="445" y2="214" stroke="#ffcc00" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>

  <!-- Insulators on posts -->
  <circle cx="55" cy="140" r="4" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <circle cx="55" cy="158" r="4" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <circle cx="55" cy="176" r="4" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <circle cx="155" cy="140" r="4" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <circle cx="155" cy="158" r="4" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <circle cx="155" cy="176" r="4" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <circle cx="255" cy="140" r="4" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <circle cx="255" cy="158" r="4" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <circle cx="255" cy="176" r="4" fill="#e8e8e8" stroke="#999" stroke-width="1"/>

  <!-- Lightning bolt spark effect on wire -->
  <g filter="url(#glow)">
    <polygon points="270,130 263,150 270,147 262,168 272,145 265,148" fill="#ffff00" opacity="0.9"/>
  </g>
  <g filter="url(#glow)" opacity="0.7">
    <polygon points="180,130 174,148 180,145 173,163 182,142 176,145" fill="#fff176"/>
  </g>

  <!-- Energizer box on post 1 -->
  <rect x="30" y="220" width="50" height="34" rx="5" fill="#1a237e" filter="url(#shadow)"/>
  <rect x="32" y="222" width="46" height="30" rx="4" fill="#283593"/>
  <!-- Energizer details -->
  <circle cx="45" cy="237" r="5" fill="#4caf50"/>
  <circle cx="45" cy="237" r="3" fill="#81c784" opacity="0.8"/>
  <rect x="55" y="231" width="18" height="4" rx="2" fill="#42a5f5"/>
  <rect x="55" y="239" width="14" height="4" rx="2" fill="#ef5350"/>
  <text x="55" y="252" font-family="Arial" font-size="6" fill="#90caf9" font-weight="bold">ENERGIZER</text>

  <!-- Warning sign -->
  <g transform="translate(220, 88)">
    <polygon points="30,0 60,50 0,50" fill="#ffcc00" stroke="#ff9900" stroke-width="2" filter="url(#shadow)"/>
    <text x="30" y="40" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#c62828">⚡</text>
  </g>

  <!-- Warning sign 2 -->
  <g transform="translate(360, 93)">
    <rect x="0" y="0" width="56" height="30" rx="4" fill="#ffcc00" stroke="#ff9900" stroke-width="2" filter="url(#shadow)"/>
    <text x="28" y="12" text-anchor="middle" font-family="Arial" font-size="7" fill="#c62828" font-weight="bold">DANGER</text>
    <text x="28" y="24" text-anchor="middle" font-family="Arial" font-size="7" fill="#c62828" font-weight="bold">ELECTRIC FENCE</text>
  </g>

  <!-- House/building in background -->
  <rect x="370" y="210" width="80" height="52" rx="2" fill="#fff9e6" stroke="#ddd" stroke-width="1.5"/>
  <polygon points="370,210 450,210 410,178" fill="#e0c080" stroke="#c9a23e" stroke-width="1.5"/>
  <rect x="395" y="230" width="18" height="32" rx="1" fill="#90caf9"/>
  <rect x="418" y="230" width="14" height="16" rx="1" fill="#90caf9"/>

  <!-- Tree -->
  <rect x="88" y="232" width="8" height="30" fill="#6d4c41"/>
  <ellipse cx="92" cy="225" rx="22" ry="20" fill="#388e3c"/>
  <ellipse cx="80" cy="235" rx="15" ry="13" fill="#43a047"/>
  <ellipse cx="104" cy="232" rx="14" ry="13" fill="#2e7d32"/>

  <!-- Grass tufts -->
  <path d="M10,262 Q14,254 18,262" stroke="#5a9657" stroke-width="2" fill="none"/>
  <path d="M20,260 Q24,253 28,260" stroke="#5a9657" stroke-width="2" fill="none"/>
  <path d="M460,262 Q464,255 468,262" stroke="#5a9657" stroke-width="2" fill="none"/>
  <path d="M470,260 Q474,254 478,260" stroke="#5a9657" stroke-width="2" fill="none"/>
</svg>
